[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so vue-router history-mode routes (e.g. /campaign/:id/production)
# resolve to index.html instead of 404 on direct load / refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HenkelGTFlexa is bundled locally under /fonts, so 'self' is sufficient (see DESIGN.md).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; font-src 'self' data:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.logic.azure.com" 
